<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSI 系統狀態 | 量子鏈結中斷</title>
    <style>
        :root {
            --rsi-cyan: #00d1e0;
            --rsi-blue-dark: #000c14;
            --rsi-blue-glow: rgba(0, 209, 224, 0.4);
            --rsi-panel-bg: rgba(5, 26, 36, 0.92);
            --rsi-border: rgba(0, 209, 224, 0.25);
            --rsi-danger: #ff4d4d;
            --rsi-success: #00ff88;
            --rsi-warning: #ffcc00;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: var(--rsi-blue-dark);
            color: #e0f7fa;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 背景裝飾 --- */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 70, 100, 0.2) 0%, transparent 80%),
                linear-gradient(var(--rsi-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--rsi-border) 1px, transparent 1px);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            z-index: -2;
        }

        .stars {
            position: absolute;
            inset: 0;
            background: transparent;
            z-index: -1;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
        }

        /* --- UEE 全息影像系統 --- */
        .hologram-system {
            position: absolute;
            width: 85vh;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 0;
        }

        .uee-logo {
            width: 50vh;
            height: 50vh;
            opacity: 0.12;
            filter: drop-shadow(0 0 15px var(--rsi-cyan));
            animation: rotate-main 180s linear infinite;
        }

        .tech-ring {
            position: absolute;
            border: 1px solid var(--rsi-cyan);
            border-radius: 50%;
            opacity: 0.1;
        }

        .ring-1 { width: 70vh; height: 70vh; border-style: dashed; animation: rotate-main 60s linear infinite; }
        .ring-2 { width: 75vh; height: 75vh; border-width: 2px; border-color: rgba(0, 209, 224, 0.05); animation: rotate-reverse 90s linear infinite; }
        .ring-3 { width: 85vh; height: 85vh; border-style: double; opacity: 0.03; animation: rotate-main 240s linear infinite; }

        @keyframes rotate-main { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* --- 主控制面板 --- */
        .container {
            width: 90%;
            max-width: 800px;
            z-index: 10;
            position: relative;
        }

        .main-panel {
            background: var(--rsi-panel-bg);
            border: 1px solid var(--rsi-border);
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            position: relative;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        }

        .panel-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid var(--rsi-cyan);
            box-shadow: 0 0 10px var(--rsi-cyan);
        }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }

        .error-tag {
            font-family: 'Orbitron', sans-serif;
            color: var(--rsi-danger);
            border: 1px solid var(--rsi-danger);
            padding: 4px 12px;
            font-size: 0.75rem;
            margin-bottom: 20px;
            display: inline-block;
            background: rgba(255, 77, 77, 0.05);
            letter-spacing: 2px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #fff;
            letter-spacing: 4px;
        }

        .description {
            color: var(--rsi-cyan);
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 35px;
            opacity: 0.8;
        }

        /* --- 計時與診斷混合區域 --- */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            margin-bottom: 35px;
        }

        .display-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 209, 224, 0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .timer-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--rsi-cyan);
            text-shadow: 0 0 15px var(--rsi-blue-glow);
            letter-spacing: 2px;
            text-align: center;
        }

        .label-text {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-bottom: 8px;
        }

        /* 診斷日誌面板 */
        .log-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 209, 224, 0.1);
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            height: 140px;
            overflow-y: hidden;
            position: relative;
            color: var(--rsi-cyan);
        }

        .log-entry {
            margin-bottom: 4px;
            opacity: 0.8;
            animation: logFadeIn 0.3s ease-out;
            white-space: nowrap;
        }
        
        @keyframes logFadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 0.8; transform: translateX(0); } }

        /* --- 按鈕組 --- */
        .btn-group { display: flex; gap: 20px; justify-content: center; }
        .rsi-btn {
            padding: 14px 35px;
            border: 1px solid var(--rsi-cyan);
            background: transparent;
            color: var(--rsi-cyan);
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .rsi-btn:hover { background: rgba(0, 209, 224, 0.1); box-shadow: 0 0 15px var(--rsi-blue-glow); }
        .rsi-btn.primary { background: var(--rsi-cyan); color: var(--rsi-blue-dark); font-weight: 700; }

        .progress-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            width: 100%;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            position: absolute;
            left: 0; top: 0; height: 100%;
            background: var(--rsi-cyan);
            box-shadow: 0 0 15px var(--rsi-cyan);
            width: 45%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <canvas id="starsCanvas" class="stars"></canvas>

    <div class="hologram-system">
        <div class="tech-ring ring-1"></div>
        <div class="tech-ring ring-2"></div>
        <div class="tech-ring ring-3"></div>

    </div>

    <div class="container">
        <main class="main-panel">
            <div class="panel-corner top-left"></div>
            <div class="panel-corner bottom-right"></div>

            <div class="error-tag">SIGNAL_LOST // CODE_30007</div>
            <h1 class="title">量子鏈結異常</h1>
            <p class="description">
                公民，我們偵測到 Persistent Universe 伺服器陣列出現非預期的位移。<br>
                技術小組正在重新校準通訊協議，請在座位上保持待命。
            </p>

            <div class="data-grid">
                <!-- 倒數計時區 -->
                <div class="display-box">
                    <span class="label-text">EST. RESTORATION</span>
                    <div class="timer-val" id="timer">01:00:00:00</div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                        <span class="label-text" style="font-size: 0.55rem; margin:0;">SYSTEM SYNC</span>
                        <span class="label-text" style="font-size: 0.55rem; margin:0;" id="progress-percent">45%</span>
                    </div>
                </div>

                <!-- 診斷日誌區 -->
                <div class="display-box" style="padding: 0;">
                    <div class="log-panel" id="log-container">
                        <div class="log-entry">[08:42:11] 正在啟動量子節點校準...</div>
                        <div class="log-entry">[08:42:15] 偵測到通訊封包遺失。</div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button class="rsi-btn" onclick="location.reload()">重新同步</button>
                <button class="rsi-btn primary" onclick="window.open('https://status.robertsspaceindustries.com/')">通訊中心</button>
            </div>
        </main>

        <footer style="margin-top: 35px; text-align: center; font-size: 0.65rem; opacity: 0.3; letter-spacing: 2px;">
            UEE AUTHORIZED TERMINAL // © 2956 ROBERTS SPACE INDUSTRIES
        </footer>
    </div>

    <script>
        // --- 1. 背景星塵 ---
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            stars = [];
            for(let i=0; i<450; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.4 + 0.1 });
            }
        }
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars(); }
        window.addEventListener('resize', resize);
        resize();
        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 209, 224, 0.4)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.x -= s.speed; if(s.x < 0) s.x = canvas.width;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- 2. 倒數與進度邏輯 ---
        let totalSeconds = 3600; 
        let timeLeft = totalSeconds;
        let startProgress = 45;

        const timerEl = document.getElementById('timer');
        const barEl = document.getElementById('progress-bar');
        const percentEl = document.getElementById('progress-percent');

        setInterval(() => { if (timeLeft > 0) timeLeft--; }, 1000);

        function updateUI() {
            const h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
            const m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const ms = Math.floor(Math.random() * 99).toString().padStart(2, '0');
            timerEl.textContent = `${h}:${m}:${s}:${ms}`;

            const currentProgress = startProgress + ((totalSeconds - timeLeft) / totalSeconds) * (100 - startProgress);
            if (currentProgress <= 100) {
                barEl.style.width = `${currentProgress}%`;
                percentEl.textContent = `${Math.floor(currentProgress)}%`;
            }
        }
        setInterval(updateUI, 50);

        // --- 3. 診斷日誌循環 ---
        const logs = [
            "正在重新分配電力至主核心...",
            "量子握手通訊重試中...",
            "正在清理緩存溢位...",
            "UEE 認證伺服器響應中。",
            "正在掃描資料庫完整性...",
            "核心節點重啟指令發送。",
            "偵測到 Persistent Universe 位移。",
            "正在同步玩家數據...",
            "修復導航索引中...",
            "系統目前處於手動修復模式。"
        ];
        const logContainer = document.getElementById('log-container');
        function addLog() {
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
            const msg = logs[Math.floor(Math.random() * logs.length)];
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.textContent = `${timeStr} ${msg}`;
            logContainer.appendChild(div);
            if (logContainer.children.length > 7) logContainer.removeChild(logContainer.firstChild);
        }
        setInterval(addLog, 2500);

    </script>
</body>
</html>
