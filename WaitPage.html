<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSI 系統狀態 | 連結中斷</title>
    <style>
        :root {
            --rsi-blue: #00d1e0;
            --rsi-dark-bg: #000c14;
            --rsi-panel-bg: rgba(5, 26, 36, 0.9);
            --rsi-border: rgba(0, 209, 224, 0.3);
            --rsi-text: #e0f7fa;
            --rsi-danger: #ff4d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Orbitron', sans-serif;
        }

        body {
            background-color: var(--rsi-dark-bg);
            color: var(--rsi-text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 100, 150, 0.15) 0%, transparent 80%),
                linear-gradient(var(--rsi-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--rsi-border) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            width: 90%;
            max-width: 700px;
            z-index: 5;
            position: relative;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .header h1 {
            font-size: 1rem;
            color: var(--rsi-blue);
            text-shadow: 0 0 8px var(--rsi-blue);
        }

        .main-panel {
            background: var(--rsi-panel-bg);
            border: 1px solid var(--rsi-border);
            padding: 50px 40px;
            backdrop-filter: blur(15px);
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .main-panel::before {
            content: "";
            position: absolute;
            top: -1px; left: 10%; right: 10%; height: 2px;
            background: var(--rsi-blue);
            box-shadow: 0 0 15px var(--rsi-blue);
        }

        .error-code {
            display: inline-block;
            font-family: monospace;
            color: var(--rsi-danger);
            border: 1px solid var(--rsi-danger);
            padding: 5px 15px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .status-title {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 2px;
        }

        .status-desc {
            color: var(--rsi-blue);
            font-size: 1rem;
            opacity: 0.9;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .display-unit {
            border: 1px dashed var(--rsi-border);
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        .timer-val {
            font-size: 3rem;
            font-weight: 300;
            color: var(--rsi-blue);
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 2px;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            margin-top: 20px;
        }

        .progress-bar {
            position: absolute;
            left: 0; top: 0; height: 100%;
            background: var(--rsi-blue);
            width: 45%;
            box-shadow: 0 0 10px var(--rsi-blue);
            transition: width 0.1s linear;
        }

        .label-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .rsi-btn {
            padding: 14px 25px;
            border: 1px solid var(--rsi-blue);
            background: transparent;
            color: var(--rsi-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 180px;
        }

        .rsi-btn:hover {
            background: rgba(0, 209, 224, 0.15);
            box-shadow: 0 0 20px rgba(0, 209, 224, 0.3);
        }

        .rsi-btn.primary {
            background: var(--rsi-blue);
            color: var(--rsi-dark-bg);
            font-weight: bold;
        }

        .quantum-bg {
            position: absolute;
            width: 600px; height: 600px;
            border: 1px solid rgba(0, 209, 224, 0.05);
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="quantum-bg"></div>

    <div class="container">
        <header class="header">
            <h1>ROBERTS SPACE INDUSTRIES</h1>
        </header>

        <main class="main-panel">
            <div class="error-code">STATUS_ERROR: CODE_30007</div>
            
            <h2 class="status-title">量子鏈結異常</h2>
            
            <p class="status-desc">
                公民，我們偵測到伺服器節點出現非預期的位移。<br>
                技術小組已啟動緊急重啟協議，請在座位上保持待命。
            </p>

            <div class="display-unit">
                <span class="label-text">預計鏈結恢復倒數 (時:分:秒:微秒)</span>
                <div class="timer-val" id="timer">01:01:01:00</div>
                
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <span class="label-text">SYSTEM RECOVERY</span>
                    <span class="label-text" id="progress-percent">45%</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="rsi-btn" onclick="location.reload()">重新建立鏈結</button>
                <button class="rsi-btn primary" onclick="window.open('https://status.robertsspaceindustries.com/')">通訊中心狀態</button>
            </div>
        </main>

        <footer style="margin-top: 30px; font-size: 0.65rem; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase;">
            Authorized UEE Terminal // © 2956 Roberts Space Industries
        </footer>
    </div>

    <script>
        // 設定初始參數
        let totalTime = 3661; // 1小時1分鐘1秒
        let timeLeft = totalTime; 
        let startProgress = 45; // 起始進度
        
        const timerEl = document.getElementById('timer');
        const barEl = document.getElementById('progress-bar');
        const percentEl = document.getElementById('progress-percent');

        // 1. 每秒執行一次的真實倒數
        const countdownInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
            } else {
                clearInterval(countdownInterval);
                timerEl.style.color = "#ffcc00"; // 時間到變色提醒
            }
        }, 1000);

        // 2. 高頻率 UI 更新 (每 50ms)，用於處理毫秒跳動與平滑進度條
        function updateUI() {
            // 格式化小時、分與秒
            const hours = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
            const mins = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            
            // 隨機跳動的「微秒」效果 (00-99)
            const ms = Math.floor(Math.random() * 99).toString().padStart(2, '0');
            
            // 更新畫面文字格式：時:分:秒:微秒
            timerEl.textContent = `${hours}:${mins}:${secs}:${ms}`;

            // 計算當前進度
            const currentProgress = startProgress + ((totalTime - timeLeft) / totalTime) * (100 - startProgress);
            
            if (currentProgress <= 100) {
                barEl.style.width = `${currentProgress}%`;
                percentEl.textContent = `${Math.floor(currentProgress)}%`;
            }
        }

        // 啟動 UI 刷新循環
        setInterval(updateUI, 50);

        // 隨機系統閃爍
        setInterval(() => {
            if (Math.random() > 0.98) {
                document.querySelector('.main-panel').style.filter = 'brightness(1.4)';
                setTimeout(() => {
                    document.querySelector('.main-panel').style.filter = 'none';
                }, 40);
            }
        }, 1000);
    </script>
</body>
</html>
